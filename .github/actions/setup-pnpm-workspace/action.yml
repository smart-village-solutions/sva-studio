name: Setup pnpm workspace
description: Checkout-independent setup for pnpm workspace jobs on GitHub Actions

inputs:
  pnpm-version:
    description: pnpm version to install
    required: false
    default: 9.12.2
  node-version-file:
    description: Path to the Node version file
    required: false
    default: .nvmrc
  install-command:
    description: Command used to install workspace dependencies
    required: false
    default: pnpm install --frozen-lockfile
  nx-cloud-encryption-key:
    description: Optional Nx Cloud end-to-end encryption key
    required: false
    default: ""
  disable-nx-cloud:
    description: Disable Nx Cloud and force local Nx execution for this job
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Configure Nx Cloud fallback
      if: ${{ inputs.disable-nx-cloud == 'true' }}
      shell: bash
      run: |
        echo "NX_NO_CLOUD=true" >> "$GITHUB_ENV"

    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node-version-file }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      env:
        NX_CLOUD_ENCRYPTION_KEY: ${{ inputs.nx-cloud-encryption-key }}
      run: ${{ inputs.install-command }}
