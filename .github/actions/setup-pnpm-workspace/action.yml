name: Setup pnpm workspace
description: Checkout-independent setup for pnpm workspace jobs on GitHub Actions

inputs:
  pnpm-version:
    description: pnpm version to install
    required: false
    default: 9.12.2
  node-version-file:
    description: Path to the Node version file
    required: false
    default: .nvmrc
  install-command:
    description: Command used to install workspace dependencies
    required: false
    default: pnpm install --frozen-lockfile
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.node-version-file }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: ${{ inputs.install-command }}
