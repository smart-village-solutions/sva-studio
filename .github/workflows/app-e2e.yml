name: App E2E

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  e2e:
    name: App E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SVA_AUTH_ISSUER: https://accounts.google.com
      SVA_AUTH_CLIENT_ID: gha-e2e-client
      SVA_AUTH_CLIENT_SECRET: gha-e2e-secret
      SVA_AUTH_REDIRECT_URI: http://localhost:3000/auth/callback
      SVA_AUTH_POST_LOGOUT_REDIRECT_URI: http://localhost:3000/
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:

          fetch-depth: 0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Determine PR scope
        id: scope
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        run: pnpm exec tsx scripts/ci/pr-scope.cli.ts --base ${{ github.event.pull_request.base.sha }} --github-output

      - name: Install Playwright browser
        if: github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.e2e_mode != 'skip')
        run: pnpm --filter sva-studio-react exec playwright install --with-deps chromium firefox

      - name: Start Redis for E2E
        if: github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.e2e_mode != 'skip')
        run: docker run -d --name sva-studio-redis-e2e -p 6379:6379 redis:7-alpine

      - name: Start required services
        if: github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.e2e_mode != 'skip')
        run: docker compose -f docker-compose.monitoring.yml up -d loki otel-collector promtail

      - name: Wait for Redis readiness
        if: github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.e2e_mode != 'skip')
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if docker exec sva-studio-redis-e2e redis-cli -p 6379 ping | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis ($i/30)..."
            sleep 2
          done
          echo "Redis did not become ready in time"
          docker ps -a
          exit 1

      - name: Run app E2E tests
        if: github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.e2e_mode != 'skip')
        run: pnpm nx run sva-studio-react:test:e2e

      - name: Upload Playwright report
        if: always() && (github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.e2e_mode != 'skip'))
        uses: actions/upload-artifact@v7
        with:
          name: app-e2e-report-${{ github.run_id }}
          path: apps/sva-studio-react/playwright-report
          if-no-files-found: warn
          retention-days: 7

      - name: Stop services
        if: always() && (github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.e2e_mode != 'skip'))
        run: |
          docker compose -f docker-compose.monitoring.yml down
          docker rm -f sva-studio-redis-e2e || true

      - name: Publish E2E summary
        if: always()
        run: |
          echo 'App E2E abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.scope.outputs.e2e_mode }}" = "skip" ]; then
            echo 'Scope: kein E2E-relevanter App-/Routing-/Auth-/Transport- oder kritischer Flow-Änderungsblock im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "Artifact: \`app-e2e-report-${GITHUB_RUN_ID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo 'Services: Redis, Loki, OTEL Collector, Promtail.' >> "$GITHUB_STEP_SUMMARY"
