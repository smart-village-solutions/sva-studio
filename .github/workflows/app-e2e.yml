name: App E2E

on:
  pull_request:
    paths:
      - 'apps/sva-studio-react/**'
      - 'packages/auth/**'
      - 'packages/routing/**'
      - 'packages/plugin-example/**'
      - 'docker-compose.yml'
      - 'docker-compose.monitoring.yml'
      - 'dev/monitoring/**'
      - '.github/workflows/app-e2e.yml'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      SVA_AUTH_ISSUER: https://accounts.google.com
      SVA_AUTH_CLIENT_ID: gha-e2e-client
      SVA_AUTH_CLIENT_SECRET: gha-e2e-secret
      SVA_AUTH_REDIRECT_URI: http://localhost:3000/auth/callback
      SVA_AUTH_POST_LOGOUT_REDIRECT_URI: http://localhost:3000/
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter sva-studio-react exec playwright install --with-deps chromium

      - name: Start Redis for E2E
        run: |
          docker run -d --name sva-studio-redis-e2e -p 6379:6379 redis:7-alpine

      - name: Start required services
        run: docker compose -f docker-compose.monitoring.yml up -d loki otel-collector promtail

      - name: Wait for Redis readiness
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if docker exec sva-studio-redis-e2e redis-cli -p 6379 ping | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis ($i/30)..."
            sleep 2
          done
          echo "Redis did not become ready in time"
          docker ps -a
          exit 1

      - name: Run app E2E smoke tests
        run: pnpm nx run sva-studio-react:test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: app-e2e-report-${{ github.run_id }}
          path: apps/sva-studio-react/playwright-report
          if-no-files-found: warn
          retention-days: 7

      - name: Stop services
        if: always()
        run: |
          docker compose -f docker-compose.monitoring.yml down
          docker rm -f sva-studio-redis-e2e || true
