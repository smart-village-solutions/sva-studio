name: Bot Comment Governance

concurrency:
  group: bot-comment-handling-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  issue_comment:
    types:
      - created
      - edited
      - deleted
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
      - deleted
  pull_request_review_thread:
    types:
      - resolved
      - unresolved

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-bot-comment-handling:
    name: Bot Comments
    if: github.event.pull_request != null || github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha || github.sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Evaluate bot comment handling
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node --experimental-strip-types scripts/ci/check-bot-comment-handling.ts
