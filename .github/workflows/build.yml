name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build_image.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build_image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/smart-village-solutions/sva-studio:${{ github.sha }}
            ghcr.io/smart-village-solutions/sva-studio:latest

  promote-dev:
    name: Promote dev
    needs: build
    uses: ./.github/workflows/promote.yml
    secrets: inherit
    with:
      bootstrap_mode: assert-none
      change_base: ${{ github.event.before }}
      change_head: ${{ github.sha }}
      environment: dev
      image_ref: ${{ needs.build.outputs.image_digest }}
      migration_mode: assert-none
