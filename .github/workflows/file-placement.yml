name: File Placement

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-file-placement:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NX_CLOUD_ENCRYPTION_KEY: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          nx-cloud-encryption-key: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}

      - name: Validate file placement
        run: pnpm check:file-placement

      - name: Publish file placement summary
        if: always()
        run: |
          echo 'File-Placement-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          echo 'Validierung: `pnpm check:file-placement`.' >> "$GITHUB_STEP_SUMMARY"
