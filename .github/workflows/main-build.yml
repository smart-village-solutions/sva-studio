name: Main Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  main:
    name: App Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:

          fetch-depth: 0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Determine PR scope
        id: scope
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        run: pnpm exec tsx scripts/ci/pr-scope.ts --base ${{ github.event.pull_request.base.sha }} --github-output

      - name: Run app build
        if: github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.app_build_mode != 'skip')
        run: pnpm nx run sva-studio-react:build

      - name: Run runtime artifact verify
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true' && steps.scope.outputs.runtime_verify_mode != 'skip'
        run: pnpm verify:runtime-artifact

      - name: Publish build summary
        if: always()
        run: |
          echo 'App-Build abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.scope.outputs.app_build_mode }}" = "skip" ]; then
            echo 'Scope: kein build-relevanter App-/UI-/Routing- oder Infrastruktur-Änderungsblock im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Scope: \`${{ steps.scope.outputs.app_build_mode }}\` gegen Base-SHA \`${{ github.event.pull_request.base.sha }}\`." >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ steps.scope.outputs.runtime_verify_mode }}" = "skip" ]; then
              echo 'Runtime-Artifact-Verify: bewusst nicht ausgeführt, weil keine runtime-kritischen Server-/Build-Pfade im Pull Request geändert wurden.' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "Runtime-Artifact-Verify: \`${{ steps.scope.outputs.runtime_verify_mode }}\` fuer runtime-kritische Aenderungen im Pull Request ausgefuehrt." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo 'Scope: voller App-Build für main.' >> "$GITHUB_STEP_SUMMARY"
            echo 'Runtime-Artifact-Verify bleibt im regulaeren Push-Pfad auf main bewusst dem Release-/Image-Verifikationspfad vorbehalten.' >> "$GITHUB_STEP_SUMMARY"
          fi
