name: Monitoring Stack CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    paths:
      - "docker-compose.monitoring.yml"
      - "dev/monitoring/**"
      - "packages/monitoring-client/**"
      - "scripts/ci/monitoring-stack-ci.sh"
      - ".github/workflows/monitoring-stack-ci.yml"
  push:
    branches:
      - main
    paths:
      - "docker-compose.monitoring.yml"
      - "dev/monitoring/**"
      - "packages/monitoring-client/**"
      - "scripts/ci/monitoring-stack-ci.sh"
      - ".github/workflows/monitoring-stack-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monitoring-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Run monitoring stack CI checks
        run: bash scripts/ci/monitoring-stack-ci.sh

      - name: Upload monitoring artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: monitoring-stack-metrics-${{ github.run_id }}
          path: artifacts/monitoring
          if-no-files-found: warn
          retention-days: 7

      - name: Publish monitoring summary
        if: always()
        run: |
          echo 'Monitoring-Stack-CI abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: \`monitoring-stack-metrics-${GITHUB_RUN_ID}\`" >> "$GITHUB_STEP_SUMMARY"
