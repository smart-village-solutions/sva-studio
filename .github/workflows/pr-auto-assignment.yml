name: PR Auto Assignment

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  assign-and-request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Assign PR author and request Copilot review
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;
            const author = pr.user.login;

            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: pull_number,
              assignees: [author],
            });

            try {
              await github.rest.pulls.requestReviewers({
                owner,
                repo,
                pull_number,
                reviewers: ['copilot'],
              });
            } catch (error) {
              core.warning(`Could not request Copilot reviewer: ${error.message}`);
            }
