name: Promote
run-name: Promote ${{ inputs.image_ref }} to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, staging, prod]
      image_ref:
        description: 'Image tag, digest, or full image ref'
        required: true
        default: latest
      migration_mode:
        description: 'Migration gate mode'
        required: true
        default: assert-none
        type: choice
        options: [assert-none, auto, run]
      bootstrap_mode:
        description: 'Bootstrap gate mode'
        required: true
        default: assert-none
        type: choice
        options: [assert-none, auto, run]
      change_base:
        description: 'Git base ref represented by the promoted image'
        required: true
      change_head:
        description: 'Git head ref represented by the promoted image'
        required: true
      maintenance_window:
        description: 'Non-sensitive, revisionable maintenance-window reference (required for staging migration run)'
        required: false
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_ref:
        required: true
        type: string
      migration_mode:
        required: false
        type: string
        default: assert-none
      bootstrap_mode:
        required: false
        type: string
        default: assert-none
      change_base:
        required: true
        type: string
      change_head:
        required: true
        type: string
      maintenance_window:
        required: false
        type: string
        default: ''

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: promote-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy ${{ inputs.environment }}
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: validate inputs
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE_INPUT: ${{ inputs.image_ref }}
          MIGRATION_MODE: ${{ inputs.migration_mode }}
          BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
          CHANGE_BASE: ${{ inputs.change_base }}
          CHANGE_HEAD: ${{ inputs.change_head }}
          MAINTENANCE_WINDOW: ${{ inputs.maintenance_window }}
        run: |
          set -euo pipefail

          case "${ENVIRONMENT}" in
            dev|staging|prod) ;;
            *)
              echo "Invalid environment: ${ENVIRONMENT}. Expected one of: dev, staging, prod." >&2
              exit 1
              ;;
          esac

          if [ -z "${IMAGE_INPUT}" ]; then
            echo "'image_ref' must not be empty." >&2
            exit 1
          fi

          if [ -z "${CHANGE_BASE}" ] || [ -z "${CHANGE_HEAD}" ]; then
            echo "'change_base' and 'change_head' must identify the exact image change range." >&2
            exit 1
          fi

          case "${MIGRATION_MODE}" in
            run|assert-none|auto) ;;
            *)
              echo "Invalid migration_mode: ${MIGRATION_MODE}. Expected one of: run, assert-none, auto." >&2
              exit 1
              ;;
          esac

          case "${BOOTSTRAP_MODE}" in
            run|assert-none|auto) ;;
            *)
              echo "Invalid bootstrap_mode: ${BOOTSTRAP_MODE}. Expected one of: run, assert-none, auto." >&2
              exit 1
              ;;
          esac

          if { [ "${ENVIRONMENT}" = "staging" ] && [ "${MIGRATION_MODE}" = "run" ]; } || { [ "${ENVIRONMENT}" = "prod" ] && { [ "${MIGRATION_MODE}" = "run" ] || [ "${BOOTSTRAP_MODE}" = "run" ]; }; }; then
            if ! printf '%s' "${MAINTENANCE_WINDOW}" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._:/# -]{2,159}$'; then
              echo "'maintenance_window' must be a non-sensitive, revisionable reference for the requested mutation." >&2
              exit 1
            fi
          fi

      - name: checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: fetch main reference
        run: git fetch --no-tags --prune origin +refs/heads/main:refs/remotes/origin/main

      - name: bind executor source to promoted change head
        env:
          CHANGE_BASE: ${{ inputs.change_base }}
          CHANGE_HEAD: ${{ inputs.change_head }}
        run: |
          set -euo pipefail
          base="$(git rev-parse --verify "${CHANGE_BASE}^{commit}")"
          head="$(git rev-parse --verify "${CHANGE_HEAD}^{commit}")"
          git merge-base --is-ancestor "${base}" "${head}"
          git checkout --detach "${head}"
          test "$(git rev-parse HEAD)" = "${head}"

      - name: setup pnpm workspace
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: validate image contract
        id: image_contract
        env:
          CHANGE_HEAD: ${{ inputs.change_head }}
          ENVIRONMENT: ${{ inputs.environment }}
          IMAGE_INPUT: ${{ inputs.image_ref }}
        run: |
          set -euo pipefail

          pnpm exec tsx scripts/ci/promote-image-contract.ts \
            --environment "${ENVIRONMENT}" \
            --image "${IMAGE_INPUT}" \
            --expected-revision "$(git rev-parse --verify "${CHANGE_HEAD}^{commit}")"

      - name: evaluate migration and bootstrap gates
        id: gate_eval
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          CHANGE_BASE: ${{ inputs.change_base }}
          CHANGE_HEAD: ${{ inputs.change_head }}
          MIGRATION_MODE: ${{ inputs.migration_mode }}
          BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
        run: |
          set -euo pipefail

          BASE_REF="${CHANGE_BASE}"
          HEAD_REF="${CHANGE_HEAD}"

          migration_executor_configured=true
          bootstrap_executor_configured=true

          echo "Evaluating deploy gates against ${BASE_REF}..${HEAD_REF}"
          pnpm exec tsx scripts/ci/promote-deploy-gates.ts \
            --base "${BASE_REF}" \
            --head "${HEAD_REF}" \
            --environment "${ENVIRONMENT}" \
            --migration-mode "${MIGRATION_MODE}" \
            --bootstrap-mode "${BOOTSTRAP_MODE}" \
            --migration-executor-configured "${migration_executor_configured}" \
            --bootstrap-executor-configured "${bootstrap_executor_configured}"

      - name: enforce migration and bootstrap gates
        env:
          MIGRATION_MODE: ${{ inputs.migration_mode }}
          BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
          MIGRATION_GATE_OK: ${{ steps.gate_eval.outputs.migration_gate_ok }}
          MIGRATION_GATE_RESULT: ${{ steps.gate_eval.outputs.migration_gate_result }}
          MIGRATION_GATE_RISK_FILES: ${{ steps.gate_eval.outputs.migration_gate_risk_files }}
          MIGRATION_GATE_MESSAGE: ${{ steps.gate_eval.outputs.migration_gate_message }}
          BOOTSTRAP_GATE_OK: ${{ steps.gate_eval.outputs.bootstrap_gate_ok }}
          BOOTSTRAP_GATE_RESULT: ${{ steps.gate_eval.outputs.bootstrap_gate_result }}
          BOOTSTRAP_GATE_RISK_FILES: ${{ steps.gate_eval.outputs.bootstrap_gate_risk_files }}
          BOOTSTRAP_GATE_MESSAGE: ${{ steps.gate_eval.outputs.bootstrap_gate_message }}
        run: |
          set -euo pipefail

          if [ "${MIGRATION_GATE_OK}" != "true" ]; then
            echo "::error::Migration gate failed (${MIGRATION_MODE}/${MIGRATION_GATE_RESULT}): ${MIGRATION_GATE_RISK_FILES}" >&2
            echo "${MIGRATION_GATE_MESSAGE}" >&2
            exit 1
          fi

          if [ "${BOOTSTRAP_GATE_OK}" != "true" ]; then
            echo "::error::Bootstrap gate failed (${BOOTSTRAP_MODE}/${BOOTSTRAP_GATE_RESULT}): ${BOOTSTRAP_GATE_RISK_FILES}" >&2
            echo "${BOOTSTRAP_GATE_MESSAGE}" >&2
            exit 1
          fi

      - name: setup quantum-cli
        uses: hostwithquantum/setup-quantum-cli@v2.0.0
        with:
          api-key: ${{ secrets.QUANTUM_API_KEY }}
          version: 3.2.1

      - name: capture previous live app digest
        id: previous_live_image
        if: ${{ inputs.environment == 'staging' || inputs.environment == 'prod' }}
        env:
          QUANTUM_ENDPOINT: ${{ vars.QUANTUM_ENDPOINT }}
        run: pnpm exec tsx scripts/ci/promote-live-digest.ts "${{ inputs.environment }}"

      - name: require successful staging parity for production mutation
        if: ${{ inputs.environment == 'prod' && (steps.gate_eval.outputs.migration_should_run == 'true' || steps.gate_eval.outputs.bootstrap_should_run == 'true') }}
        env:
          DEPLOY_IMAGE_DIGEST: ${{ steps.image_contract.outputs.deploy_summary_digest }}
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm exec tsx scripts/ci/verify-staging-promote-evidence.ts

      - name: create database backup before one-shot jobs
        id: backup_job
        if: ${{ (inputs.environment == 'staging' || inputs.environment == 'prod') && (steps.gate_eval.outputs.migration_should_run == 'true' || steps.gate_eval.outputs.bootstrap_should_run == 'true') }}
        env:
          APP_CONFIG: ${{ secrets.APP_CONFIG }}
          DEPLOY_IMAGE_DIGEST: ${{ steps.image_contract.outputs.deploy_summary_digest }}
          QUANTUM_ENDPOINT: ${{ vars.QUANTUM_ENDPOINT }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_ENDPOINT: https://fileserver.smart-village.app
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          umask 077
          trap 'rm -f .env' EXIT
          pnpm exec tsx scripts/ci/render-compose-env.ts --output .env
          printf '\nIMAGE_REF=%s\n' "${{ steps.image_contract.outputs.deploy_image_ref }}" >> .env
          pnpm exec tsx scripts/ci/promote-backup-job.ts "${{ inputs.environment }}"

      - name: verify database backup object
        if: ${{ (inputs.environment == 'staging' || inputs.environment == 'prod') && (steps.gate_eval.outputs.migration_should_run == 'true' || steps.gate_eval.outputs.bootstrap_should_run == 'true') }}
        env:
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_BUCKET: ${{ steps.backup_job.outputs.backup_bucket }}
          S3_ENDPOINT: https://fileserver.smart-village.app
          S3_OBJECT_KEY: ${{ steps.backup_job.outputs.backup_object }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: pnpm exec tsx scripts/ci/verify-promote-backup.ts

      - name: run migration one-shot job
        id: migration_job
        if: ${{ steps.gate_eval.outputs.migration_should_run == 'true' }}
        env:
          APP_CONFIG: ${{ secrets.APP_CONFIG }}
          QUANTUM_ENDPOINT: ${{ vars.QUANTUM_ENDPOINT }}
          SVA_DEPLOY_REVISION: ${{ steps.image_contract.outputs.deploy_revision }}
        run: |
          set -euo pipefail
          umask 077
          trap 'rm -f .env' EXIT
          pnpm exec tsx scripts/ci/render-compose-env.ts --output .env
          printf '\nIMAGE_REF=%s\n' "${{ steps.image_contract.outputs.deploy_image_ref }}" >> .env
          pnpm exec tsx scripts/ci/promote-one-shot-job.ts --kind migration --environment "${{ inputs.environment }}"

      - name: run bootstrap one-shot job
        id: bootstrap_job
        if: ${{ steps.gate_eval.outputs.bootstrap_should_run == 'true' }}
        env:
          APP_CONFIG: ${{ secrets.APP_CONFIG }}
          QUANTUM_ENDPOINT: ${{ vars.QUANTUM_ENDPOINT }}
          SVA_DEPLOY_REVISION: ${{ steps.image_contract.outputs.deploy_revision }}
        run: |
          set -euo pipefail
          umask 077
          trap 'rm -f .env' EXIT
          pnpm exec tsx scripts/ci/render-compose-env.ts --output .env
          printf '\nIMAGE_REF=%s\n' "${{ steps.image_contract.outputs.deploy_image_ref }}" >> .env
          pnpm exec tsx scripts/ci/promote-one-shot-job.ts --kind bootstrap --environment "${{ inputs.environment }}"

      - name: run one-shot postconditions
        if: ${{ (inputs.environment == 'staging' || inputs.environment == 'prod') && (steps.gate_eval.outputs.migration_should_run == 'true' || steps.gate_eval.outputs.bootstrap_should_run == 'true') }}
        env:
          APP_CONFIG: ${{ secrets.APP_CONFIG }}
        run: |
          set -euo pipefail
          umask 077
          trap 'rm -f .env config/runtime/base.vars config/runtime/studio.vars' EXIT
          pnpm exec tsx scripts/ci/render-compose-env.ts --output .env
          mkdir -p config/runtime
          printf '%s\n' "${APP_CONFIG}" > config/runtime/base.vars
          : > config/runtime/studio.vars
          pnpm exec tsx scripts/ops/runtime-env.ts doctor studio

      - name: deploy
        id: deploy
        env:
          QUANTUM_ENDPOINT: ${{ vars.QUANTUM_ENDPOINT }}
          ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_IMAGE_REF: ${{ steps.image_contract.outputs.deploy_image_ref }}
          DEPLOY_REVISION: ${{ steps.image_contract.outputs.deploy_revision }}
          APP_CONFIG: ${{ secrets.APP_CONFIG }}
        run: |
          set -euo pipefail
          umask 077
          trap 'rm -f .env stack.json stack.yaml' EXIT

          if [ -z "${QUANTUM_ENDPOINT}" ]; then
            echo "'QUANTUM_ENDPOINT' must not be empty." >&2
            exit 1
          fi

          if [ -z "${APP_CONFIG}" ]; then
            echo "'APP_CONFIG' must not be empty." >&2
            exit 1
          fi

          pnpm exec tsx scripts/ci/render-compose-env.ts --output .env
          {
            printf '\nIMAGE_REF=%s\n' "${DEPLOY_IMAGE_REF}"
            printf 'SVA_DEPLOY_REVISION=%s\n' "${DEPLOY_REVISION}"
          } >> .env
          docker compose -f compose.yaml -f ./deploy/compose.${ENVIRONMENT}.yaml config --no-normalize --format json > stack.json
          pnpm exec tsx scripts/ci/render-quantum-stack.ts --input stack.json --output stack.yaml

          quantum-cli stacks deploy -f stack.yaml --stack "studio-${ENVIRONMENT}" --endpoint "${QUANTUM_ENDPOINT}"

      - name: verify deployed runtime
        if: ${{ inputs.environment == 'staging' || inputs.environment == 'prod' }}
        env:
          APP_CONFIG: ${{ secrets.APP_CONFIG }}
        run: |
          set -euo pipefail
          umask 077
          trap 'rm -f .env config/runtime/base.vars config/runtime/studio.vars' EXIT
          pnpm exec tsx scripts/ci/render-compose-env.ts --output .env
          mkdir -p config/runtime
          printf '%s\n' "${APP_CONFIG}" > config/runtime/base.vars
          : > config/runtime/studio.vars
          pnpm exec tsx scripts/ops/runtime-env.ts smoke studio

      - name: verify deployed runtime image digest
        if: ${{ inputs.environment == 'staging' || inputs.environment == 'prod' }}
        env:
          QUANTUM_ENDPOINT: ${{ vars.QUANTUM_ENDPOINT }}
        run: pnpm exec tsx scripts/ci/promote-live-digest.ts "${{ inputs.environment }}" --expected "${{ steps.image_contract.outputs.deploy_image_ref }}"

      - name: write staging parity evidence
        if: ${{ inputs.environment == 'staging' && success() }}
        env:
          DEPLOY_IMAGE_DIGEST: ${{ steps.image_contract.outputs.deploy_summary_digest }}
          STAGING_MUTATION: ${{ steps.gate_eval.outputs.migration_should_run == 'true' || steps.gate_eval.outputs.bootstrap_should_run == 'true' }}
        run: pnpm exec tsx scripts/ci/write-staging-promote-evidence.ts

      - name: upload staging parity evidence
        if: ${{ inputs.environment == 'staging' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: promote-staging-parity-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/promote-staging-parity-${{ github.run_id }}.json
          retention-days: 14

      - name: upload redacted one-shot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promote-one-shot-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/promote-*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: write deploy summary
        if: always()
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_IMAGE_REF: ${{ steps.image_contract.outputs.deploy_image_ref }}
          DEPLOY_IMAGE_TAG: ${{ steps.image_contract.outputs.deploy_summary_tag }}
          DEPLOY_IMAGE_DIGEST: ${{ steps.image_contract.outputs.deploy_summary_digest }}
          DEPLOY_IMAGE_IMMUTABILITY: ${{ steps.image_contract.outputs.deploy_summary_immutability }}
          DEPLOY_IMAGE_ROLLBACK_HINT: ${{ steps.image_contract.outputs.deploy_summary_rollback_hint }}
          DEPLOY_REVISION: ${{ steps.image_contract.outputs.deploy_revision }}
          MIGRATION_MODE: ${{ inputs.migration_mode }}
          BOOTSTRAP_MODE: ${{ inputs.bootstrap_mode }}
          MAINTENANCE_WINDOW: ${{ inputs.maintenance_window }}
          MIGRATION_GATE_RESULT: ${{ steps.gate_eval.outputs.migration_gate_result }}
          MIGRATION_GATE_RISK_FILES: ${{ steps.gate_eval.outputs.migration_gate_risk_files }}
          BOOTSTRAP_GATE_RESULT: ${{ steps.gate_eval.outputs.bootstrap_gate_result }}
          BOOTSTRAP_GATE_RISK_FILES: ${{ steps.gate_eval.outputs.bootstrap_gate_risk_files }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          PREVIOUS_LIVE_IMAGE: ${{ steps.previous_live_image.outputs.previous_live_image }}
          MIGRATION_JOB_OUTCOME: ${{ steps.migration_job.outcome }}
          BOOTSTRAP_JOB_OUTCOME: ${{ steps.bootstrap_job.outcome }}
        run: |
          set -euo pipefail

          deploy_started=no
          if [ "${DEPLOY_OUTCOME}" != "" ] && [ "${DEPLOY_OUTCOME}" != "skipped" ]; then
            deploy_started=yes
          fi

          {
            echo "## Promote summary"
            echo
            echo "| field | value |"
            echo "| --- | --- |"
            echo "| environment | ${ENVIRONMENT} |"
            echo "| image | ${DEPLOY_IMAGE_REF:-not-evaluated} |"
            echo "| tag | ${DEPLOY_IMAGE_TAG:-not-evaluated} |"
            echo "| digest | ${DEPLOY_IMAGE_DIGEST:-not-evaluated} |"
            echo "| previous_live_image | ${PREVIOUS_LIVE_IMAGE:-not-captured} |"
            echo "| immutability | ${DEPLOY_IMAGE_IMMUTABILITY:-not-evaluated} |"
            echo "| deploy_revision | ${DEPLOY_REVISION:-not-evaluated} |"
            echo "| migration_mode | ${MIGRATION_MODE} |"
            echo "| maintenance_window | ${MAINTENANCE_WINDOW:-not-required} |"
            echo "| migration_gate_result | ${MIGRATION_GATE_RESULT:-not-evaluated} |"
            echo "| migration_job | ${MIGRATION_JOB_OUTCOME:-not-run} |"
            echo "| migration_risk_files | ${MIGRATION_GATE_RISK_FILES:-none} |"
            echo "| bootstrap_mode | ${BOOTSTRAP_MODE} |"
            echo "| bootstrap_gate_result | ${BOOTSTRAP_GATE_RESULT:-not-evaluated} |"
            echo "| bootstrap_job | ${BOOTSTRAP_JOB_OUTCOME:-not-run} |"
            echo "| bootstrap_risk_files | ${BOOTSTRAP_GATE_RISK_FILES:-none} |"
            echo "| app_deploy_started | ${deploy_started} |"
            echo "| rollback_hint | ${DEPLOY_IMAGE_ROLLBACK_HINT:-not-evaluated} |"
          } >> "${GITHUB_STEP_SUMMARY}"
