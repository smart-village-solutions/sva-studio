name: Quality Checks

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint / lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NX_CLOUD_ENCRYPTION_KEY: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          nx-cloud-encryption-key: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}

      - name: Run lint gate
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: pnpm test:eslint

      - name: Publish lint summary
        if: always()
        run: |
          echo 'Lint-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo 'Command: `pnpm test:eslint`' >> "$GITHUB_STEP_SUMMARY"

  unit:
    name: Unit / unit
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NX_CLOUD_ENCRYPTION_KEY: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          nx-cloud-encryption-key: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}

      - name: Run unit gate
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: pnpm test:unit

      - name: Publish unit summary
        if: always()
        run: |
          echo 'Unit-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo 'Command: `pnpm test:unit`' >> "$GITHUB_STEP_SUMMARY"

  types:
    name: Types / types
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NX_CLOUD_ENCRYPTION_KEY: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace
        with:
          nx-cloud-encryption-key: ${{ secrets.NX_CLOUD_ENCRYPTION_KEY }}

      - name: Run types gate
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: pnpm test:types

      - name: Publish types summary
        if: always()
        run: |
          echo 'Types-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo 'Command: `pnpm test:types`' >> "$GITHUB_STEP_SUMMARY"
