name: Quality Gates

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Ensure PR base ref is available
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        run: git fetch origin "${{ github.base_ref }}" --no-tags --prune

      - name: Determine PR scope
        id: scope
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        run: pnpm exec tsx scripts/ci/pr-scope.ts --base origin/${{ github.base_ref }} --github-output

      - name: Run lint gate
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            pnpm test:eslint
          elif [ "${{ steps.scope.outputs.quality_gate_mode }}" = "full" ]; then
            pnpm test:eslint
          else
            NX_BASE=origin/${{ github.base_ref }} pnpm test:eslint:affected
          fi

      - name: Publish lint summary
        if: always()
        run: |
          echo 'Lint-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Scope: \`${{ steps.scope.outputs.quality_gate_mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Scope: voller Workspace-Lauf für main.' >> "$GITHUB_STEP_SUMMARY"
          fi

  unit:
