name: Runtime Gates

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  pull-requests: read

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Determine PR scope
        id: scope
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        run: pnpm exec tsx scripts/ci/pr-scope.cli.ts --base ${{ github.event.pull_request.base.sha }} --github-output

      - name: Start Redis for coverage tests
        if: github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.coverage_mode != 'skip')
        run: docker run -d --name sva-studio-redis-coverage -p 6379:6379 redis:7-alpine

      - name: Wait for Redis readiness
        if: github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.coverage_mode != 'skip')
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if docker exec sva-studio-redis-coverage redis-cli -p 6379 ping | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis ($i/30)..."
            sleep 2
          done
          echo "Redis did not become ready in time"
          docker ps -a
          exit 1

      - name: Run coverage on PR
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true' && steps.scope.outputs.coverage_mode != 'skip'
        run: |
          if [ "${{ steps.scope.outputs.coverage_mode }}" = "full" ]; then
            pnpm test:coverage
          else
            NX_BASE=${{ github.event.pull_request.base.sha }} pnpm test:coverage:affected
          fi

      - name: Run PR coverage gates
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true' && steps.scope.outputs.coverage_mode != 'skip'
        env:
          COVERAGE_GATE_REQUIRE_SUMMARIES: ${{ steps.scope.outputs.coverage_mode == 'full' && '1' || '0' }}
          COVERAGE_GATE_PROJECT_FILTER: ${{ steps.scope.outputs.coverage_regression_projects }}
        run: |
          pnpm patch-coverage-gate --base=${{ github.event.pull_request.base.sha }}
          pnpm sonar-new-code-gate --base=${{ github.event.pull_request.base.sha }}
          pnpm coverage-gate

      - name: Run full coverage on main/schedule
        if: github.event_name != 'pull_request'
        run: pnpm test:coverage

      - name: Evaluate coverage gates
        if: github.event_name != 'pull_request'
        env:
          COVERAGE_GATE_REQUIRE_SUMMARIES: '1'
        run: pnpm coverage-gate

      - name: Build app for Codecov bundle analysis
        if: github.event_name != 'pull_request' && env.CODECOV_TOKEN != ''
        run: pnpm nx run sva-studio-react:build

      - name: Upload to Codecov
        if: always() && env.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.coverage_mode != 'skip'))
        uses: codecov/codecov-action@v7
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./apps/**/coverage/lcov.info,./packages/**/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: false
          flags: unittests
          name: coverage-${{ github.run_id }}

      - name: Upload coverage artifacts
        if: always() && (github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.coverage_mode != 'skip'))
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ github.run_id }}
          path: |
            **/coverage/coverage-summary.json
            **/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 7

      - name: Prepare SonarCloud coverage report
        if: always() && github.event_name != 'pull_request' && env.SONAR_TOKEN != ''
        run: pnpm sonar:prepare-lcov

      - name: Ensure full git history for SonarCloud
        if: always() && github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --unshallow --tags
          else
            git fetch --tags --prune
          fi
          git rev-parse --is-shallow-repository

      - name: Setup Java for SonarCloud
        if: always() && github.event_name != 'pull_request' && env.SONAR_TOKEN != ''
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: SonarCloud Scan
        if: always() && github.event_name != 'pull_request' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.scanner.skipJreProvisioning=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Stop Redis
        if: always() && (github.event_name != 'pull_request' || (steps.changes.outputs.relevant == 'true' && steps.scope.outputs.coverage_mode != 'skip'))
        run: docker rm -f sva-studio-redis-coverage || true

      - name: Publish coverage summary
        if: always()
        run: |
          echo 'Coverage-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, Heavy-Checks wurden bewusst übersprungen.' >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.scope.outputs.coverage_mode }}" = "skip" ]; then
            echo 'Scope: regulärer PR ohne Coverage-/CI-kritische Änderungen, der teure Coverage-Re-Run wird bewusst übersprungen.' >> "$GITHUB_STEP_SUMMARY"
            echo 'Schutzwirkung: Unit/Types/Lint/Build/Integration/E2E im PR, volle Coverage weiterhin auf main und nightly.' >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Scope: \`${{ steps.scope.outputs.coverage_mode }}\` gegen Base-SHA \`${{ github.event.pull_request.base.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Scope: voller Coverage-Lauf für main/schedule' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ github.event_name }}" != "pull_request" ] || ([ "${{ steps.changes.outputs.relevant }}" = "true" ] && [ "${{ steps.scope.outputs.coverage_mode }}" != "skip" ]); then
            echo "Artifact: \`coverage-reports-${GITHUB_RUN_ID}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Determine PR scope
        id: scope
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        run: pnpm exec tsx scripts/ci/pr-scope.cli.ts --base ${{ github.event.pull_request.base.sha }} --github-output

      - name: Evaluate complexity gates
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            pnpm complexity-gate
          elif [ "${{ steps.scope.outputs.quality_gate_mode }}" = "full" ]; then
            pnpm complexity-gate
          else
            pnpm complexity-gate --base ${{ github.event.pull_request.base.sha }}
          fi

      - name: Publish complexity summary
        if: always()
        run: |
          echo 'Komplexitäts-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Scope: \`${{ steps.scope.outputs.quality_gate_mode }}\` gegen Base-SHA \`${{ github.event.pull_request.base.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Scope: voller Workspace-Lauf für main/schedule.' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo 'Baseline und Policy stammen aus tooling/quality/complexity-*.json.' >> "$GITHUB_STEP_SUMMARY"

  integration-pr:
    name: PR Integration
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          filter: tree:0

      - name: Detect relevant PR changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Determine PR scope
        id: scope
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm exec tsx scripts/ci/pr-scope.cli.ts --base ${{ github.event.pull_request.base.sha }} --github-output

      - name: Run scoped integration tests
        if: steps.changes.outputs.relevant == 'true' && steps.scope.outputs.integration_mode != 'skip'
        run: |
          if [ "${{ steps.scope.outputs.integration_mode }}" = "full" ]; then
            pnpm test:integration
          else
            pnpm exec tsx scripts/ci/run-integration-gate.ts --mode affected --base ${{ github.event.pull_request.base.sha }}
          fi

      - name: Publish PR integration summary
        if: always()
        run: |
          echo 'PR-Integrations-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ steps.scope.outputs.integration_mode }}" = "skip" ]; then
            echo 'Scope: kein Laufzeit-/Routing-/Transport-Einfluss im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "Scope: \`${{ steps.scope.outputs.integration_mode }}\` gegen Base-SHA \`${{ github.event.pull_request.base.sha }}\`." >> "$GITHUB_STEP_SUMMARY"
          echo 'Allgemeine Integration umfasst nur echte infra-abhängige Ziele; Monitoring-Checks laufen separat im Workflow `Monitoring Stack`.' >> "$GITHUB_STEP_SUMMARY"

  integration-required:
    name: Integration
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          filter: tree:0

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Run integration tests (required on main/schedule)
        run: pnpm test:integration

      - name: Publish integration summary
        if: always()
        run: |
          echo 'Integrations-Gate fuer main/schedule abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          echo 'Scope: voller Lauf der allgemeinen echten Integrationsziele via `pnpm test:integration`.' >> "$GITHUB_STEP_SUMMARY"
          echo 'Monitoring-Checks laufen separat im Workflow `Monitoring Stack`.' >> "$GITHUB_STEP_SUMMARY"
