name: SonarCloud

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    env:
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Redis
        run: |
          docker run -d --name sva-studio-redis-sonar -p 6379:6379 redis:7-alpine

      - name: Wait for Redis readiness
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if docker exec sva-studio-redis-sonar redis-cli -p 6379 ping | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Redis did not become ready in time"
          exit 1

      - name: Run coverage
        run: pnpm test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Stop Redis
        if: always()
        run: docker rm -f sva-studio-redis-sonar || true
