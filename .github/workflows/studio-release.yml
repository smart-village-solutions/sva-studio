name: Studio Release Preparation

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Optionaler unveraenderlicher Tag fuer das gebaute Image'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: ./.github/workflows/studio-image-build.yml
    secrets: inherit
    with:
      image_tag: ${{ github.event.inputs.image_tag }}

  verify:
    needs: build
    uses: ./.github/workflows/studio-artifact-verify.yml
    secrets: inherit
    with:
      image_digest: ${{ needs.build.outputs.image_digest }}
      image_tag: ${{ needs.build.outputs.image_tag }}
