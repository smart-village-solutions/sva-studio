name: Coverage and Quality Gates

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  pull-requests: read

jobs:
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Start Redis for coverage tests
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: |
          docker run -d --name sva-studio-redis-coverage -p 6379:6379 redis:7-alpine

      - name: Wait for Redis readiness
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if docker exec sva-studio-redis-coverage redis-cli -p 6379 ping | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis ($i/30)..."
            sleep 2
          done
          echo "Redis did not become ready in time"
          docker ps -a
          exit 1

      - name: Ensure origin/main is available for affected
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        run: git fetch origin "${{ github.base_ref }}" --no-tags --prune --depth=1

      - name: Run affected coverage on PR
        if: github.event_name == 'pull_request' && steps.changes.outputs.relevant == 'true'
        run: pnpm nx affected --target=test:coverage --base=origin/${{ github.base_ref }} --verbose --output-style=stream

      - name: Run full coverage on main/schedule
        if: github.event_name != 'pull_request'
        run: pnpm test:coverage

      - name: Evaluate coverage gates
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        env:
          COVERAGE_GATE_REQUIRE_SUMMARIES: ${{ github.event_name == 'pull_request' && '0' || '1' }}
        run: pnpm coverage-gate

      - name: Build app for Codecov bundle analysis
        if: github.event_name != 'pull_request' && env.CODECOV_TOKEN != ''
        run: pnpm nx run sva-studio-react:build

      - name: Upload to Codecov
        if: always() && env.CODECOV_TOKEN != '' && (github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true')
        uses: codecov/codecov-action@v6
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./apps/**/coverage/lcov.info,./packages/**/coverage/lcov.info
          disable_search: true
          fail_ci_if_error: false
          flags: unittests
          name: coverage-${{ github.run_id }}

      - name: Upload coverage artifacts
        if: always() && (github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true')
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports-${{ github.run_id }}
          path: |
            **/coverage/coverage-summary.json
            **/coverage/lcov.info
          if-no-files-found: warn
          retention-days: 7

      - name: Prepare SonarCloud coverage report
        if: always() && github.event_name != 'pull_request' && env.SONAR_TOKEN != ''
        run: pnpm sonar:prepare-lcov

      - name: Ensure full git history for SonarCloud
        if: always() && github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          if [ "$(git rev-parse --is-shallow-repository)" = "true" ]; then
            git fetch --unshallow --tags
          else
            git fetch --tags --prune
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --no-tags --prune
          fi
          git rev-parse --is-shallow-repository

      - name: SonarCloud Scan
        if: always() && github.event_name != 'pull_request' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Stop Redis
        if: always() && (github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true')
        run: docker rm -f sva-studio-redis-coverage || true

      - name: Publish coverage summary
        if: always()
        run: |
          echo 'Coverage-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, Heavy-Checks wurden bewusst übersprungen.' >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Scope: affected gegen \`origin/${{ github.base_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo 'Scope: voller Coverage-Lauf für main/schedule' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ steps.changes.outputs.relevant }}" = "true" ]; then
            echo "Artifact: \`coverage-reports-${GITHUB_RUN_ID}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo 'Zusatz: Codecov- und Sonar-Schritte laufen nur außerhalb von Pull Requests.' >> "$GITHUB_STEP_SUMMARY"
          fi

  complexity:
    name: Complexity Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0

      - name: Detect relevant PR changes
        id: changes
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Evaluate complexity gates
        if: github.event_name != 'pull_request' || steps.changes.outputs.relevant == 'true'
        run: pnpm complexity-gate

      - name: Publish complexity summary
        if: always()
        run: |
          echo 'Komplexitäts-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo 'Baseline und Policy stammen aus tooling/quality/complexity-*.json.' >> "$GITHUB_STEP_SUMMARY"

  integration-pr:
    name: PR Integration Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0

      - name: Detect relevant PR changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            relevant:
              - '**'
              - '!docs/**'
              - '!**/*.md'
              - '!.github/agents/**'
              - '!.github/prompts/**'
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/PULL_REQUEST_TEMPLATE.md'

      - name: Setup workspace
        if: steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Ensure origin/main is available for affected integration
        if: steps.changes.outputs.relevant == 'true'
        run: git fetch origin "${{ github.base_ref }}" --no-tags --prune --depth=1

      - name: Run affected integration tests not covered by dedicated PR workflows
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm nx affected --target=test:integration --base=origin/${{ github.base_ref }} --exclude=monitoring-client --output-style=stream

      - name: Publish PR integration summary
        if: always()
        run: |
          echo 'PR-Integrations-Gate abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.relevant }}" != "true" ]; then
            echo 'Scope: keine code-relevanten Änderungen im Pull Request, das Gate endet bewusst als No-op-Erfolg.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "Scope: affected \`test:integration\` gegen \`origin/${{ github.base_ref }}\`, exklusive \`monitoring-client\`." >> "$GITHUB_STEP_SUMMARY"
          echo 'Monitoring-Checks laufen separat im Workflow `Monitoring Stack CI`.' >> "$GITHUB_STEP_SUMMARY"

  integration-required:
    name: Integration Gate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0

      - name: Setup workspace
        uses: ./.github/actions/setup-pnpm-workspace

      - name: Run integration tests (required on main/schedule)
        run: pnpm test:integration

      - name: Publish integration summary
        if: always()
        run: |
          echo 'Integrations-Gate fuer main/schedule abgeschlossen.' >> "$GITHUB_STEP_SUMMARY"
          echo 'Scope: voller `pnpm test:integration` Lauf.' >> "$GITHUB_STEP_SUMMARY"
