services:
  app:
    image: ${IMAGE_REF:-ghcr.io/smart-village-solutions/sva-studio:${TAG:-latest}}
    networks:
      - network-node-005
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
      labels:
        - 'traefik.docker.network=network-node-005'
        - 'traefik.enable=true'
        - 'traefik.frontend.passHostHeader=true'
        - 'traefik.frontend.rule=Host:studio-dev.smart-village.app'
        - 'traefik.port=3000'
        - 'traefik.http.routers.studio-dev-app.rule=Host(`studio-dev.smart-village.app`)'
        - 'traefik.http.routers.studio-dev-app.entrypoints=web,websecure'
        - 'traefik.http.routers.studio-dev-app.tls=true'
        - 'traefik.http.routers.studio-dev-app.tls.certresolver=letsencrypt'
        - 'traefik.http.services.studio-dev-app.loadbalancer.server.port=3000'

  provisioner:
    image: ${IMAGE_REF:-ghcr.io/smart-village-solutions/sva-studio:${TAG:-latest}}
    networks:
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M

  migrate:
    image: ${IMAGE_REF:-ghcr.io/smart-village-solutions/sva-studio:${TAG:-latest}}
    networks:
      - default
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: none
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 256M

  bootstrap:
    image: ${IMAGE_REF:-ghcr.io/smart-village-solutions/sva-studio:${TAG:-latest}}
    networks:
      - default
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: none
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 256M

  redis:
    networks:
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M

  postgres:
    networks:
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 1G

networks:
  default:
  network-node-005:
    external: true
