services:
  app:
    image: ${IMAGE_REF}
    networks:
      - network-node-005
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
      labels:
        - "traefik.swarm.network=network-node-005"
        - "traefik.enable=true"
        - "traefik.http.routers.studio-staging-app.rule=Host(`studio-staging.smart-village.app`)"
        - "traefik.http.routers.studio-staging-app.tls=true"
        - "traefik.http.services.studio-staging-app.loadbalancer.server.port=3000"

  provisioner:
    image: ${IMAGE_REF}
    networks:
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
        window: 120s
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M

  migrate:
    image: ${IMAGE_REF}
    networks:
      - default
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: none
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 256M

  bootstrap:
    image: ${IMAGE_REF}
    networks:
      - default
    deploy:
      replicas: 0
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: none
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 256M

  redis:
    networks:
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M

  postgres:
    networks:
      - default
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 1G

networks:
  default:
  network-node-005:
    external: true
