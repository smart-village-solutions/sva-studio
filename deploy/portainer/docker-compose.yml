# ---------------------------------------------------------------------------
# SVA Studio – Swarm-/Traefik-Referenz-Betriebsprofil
#
# Voraussetzungen:
#   - Docker Swarm initialisiert
#   - Externes Overlay-Netzwerk "public" existiert
#   - Traefik-Ingress läuft im selben Swarm und lauscht auf dem "public"-Netzwerk
#   - Alle sensiblen Werte werden als normale Stack-Variablen gesetzt
#   - Image ist vorgebaut und in einer Registry verfügbar
# ---------------------------------------------------------------------------

services:
  # -------------------------------------------------------------------------
  # App – TanStack-Start-/Nitro-Server
  # -------------------------------------------------------------------------
  app:
    image: ${SVA_IMAGE_REF}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      SVA_RUNTIME_PROFILE: "${SVA_RUNTIME_PROFILE}"
      SVA_AUTH_CLIENT_SECRET: "${SVA_AUTH_CLIENT_SECRET}"
      SVA_AUTH_STATE_SECRET: "${SVA_AUTH_STATE_SECRET}"
      KEYCLOAK_ADMIN_CLIENT_SECRET: "${KEYCLOAK_ADMIN_CLIENT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      IAM_PII_KEYRING_JSON: "${IAM_PII_KEYRING_JSON}"
      APP_DB_PASSWORD: "${APP_DB_PASSWORD}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      ENABLE_OTEL: "${ENABLE_OTEL}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT}"
      POSTGRES_DB: sva_studio
      APP_DB_USER: "${APP_DB_USER}"
      SVA_PUBLIC_BASE_URL: "${SVA_PUBLIC_BASE_URL}"
      SVA_AUTH_ISSUER: "${SVA_AUTH_ISSUER}"
      SVA_AUTH_CLIENT_ID: "${SVA_AUTH_CLIENT_ID}"
      SVA_AUTH_REDIRECT_URI: "${SVA_AUTH_REDIRECT_URI}"
      SVA_AUTH_POST_LOGOUT_REDIRECT_URI: "${SVA_AUTH_POST_LOGOUT_REDIRECT_URI}"
      IAM_PII_ACTIVE_KEY_ID: k1
      IAM_CSRF_ALLOWED_ORIGINS: "${IAM_CSRF_ALLOWED_ORIGINS}"
      SVA_PARENT_DOMAIN: "${SVA_PARENT_DOMAIN}"
      SVA_ALLOWED_INSTANCE_IDS: "${SVA_ALLOWED_INSTANCE_IDS}"
      VITE_IAM_UI_ENABLED: "${VITE_IAM_UI_ENABLED}"
      VITE_IAM_ADMIN_ENABLED: "${VITE_IAM_ADMIN_ENABLED}"
      VITE_IAM_BULK_ENABLED: "${VITE_IAM_BULK_ENABLED}"
      IAM_UI_ENABLED: "${IAM_UI_ENABLED}"
      IAM_ADMIN_ENABLED: "${IAM_ADMIN_ENABLED}"
      IAM_BULK_ENABLED: "${IAM_BULK_ENABLED}"
      IAM_DEBUG_PROFILE_ERRORS: "${IAM_DEBUG_PROFILE_ERRORS}"
      KEYCLOAK_ADMIN_BASE_URL: "${KEYCLOAK_ADMIN_BASE_URL}"
      KEYCLOAK_ADMIN_REALM: "${KEYCLOAK_ADMIN_REALM}"
      KEYCLOAK_ADMIN_CLIENT_ID: "${KEYCLOAK_ADMIN_CLIENT_ID}"
      IAM_ROLE_RECONCILE_INTERVAL_MS: "300000"
      IAM_ROLE_RECONCILE_INSTANCE_IDS: ""
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "app"
      com.sva-studio.environment: "production"
    networks:
      - public
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
          cpus: '1.0'
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.frontend.rule=Host:${SVA_PARENT_DOMAIN},${SVA_PUBLIC_HOST}
        - traefik.port=3000
        - traefik.http.routers.sva-studio.rule=Host(`${SVA_PARENT_DOMAIN}`)
        - traefik.http.routers.sva-studio.entrypoints=web,websecure
        - traefik.http.routers.sva-studio.tls.certresolver=letsencrypt
        - traefik.http.routers.sva-studio.service=sva-studio
        - traefik.http.routers.sva-studio-public.rule=Host(`${SVA_PUBLIC_HOST}`)
        - traefik.http.routers.sva-studio-public.entrypoints=web,websecure
        - traefik.http.routers.sva-studio-public.tls.certresolver=letsencrypt
        - traefik.http.routers.sva-studio-public.service=sva-studio
        - traefik.http.routers.sva-studio-instance.rule=HostRegexp(`{subdomain:[a-z0-9]([a-z0-9-]*[a-z0-9])?}.${SVA_PARENT_DOMAIN}`)
        - traefik.http.routers.sva-studio-instance.entrypoints=web,websecure
        - traefik.http.routers.sva-studio-instance.tls.certresolver=letsencrypt
        - traefik.http.routers.sva-studio-instance.service=sva-studio
        - traefik.http.services.sva-studio.loadbalancer.server.port=3000
  # -------------------------------------------------------------------------
  # Redis – Session-/Cache-Store
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    environment:
      SVA_DEPLOY_REVISION: "${SVA_IMAGE_TAG}"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "redis"
      com.sva-studio.environment: "production"
    command:
      - sh
      - -ec
      - |
        redis_password="$${REDIS_PASSWORD:-}"
        exec redis-server \
          --appendonly yes \
          --maxmemory 256mb \
          --maxmemory-policy allkeys-lru \
          --requirepass "$${redis_password}"
    volumes:
      - redis-data:/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 320M
          cpus: '0.25'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------------------------------------------------------------------------
  # Postgres – IAM Core Data Layer
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sva_studio
      POSTGRES_USER: sva
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "postgres"
      com.sva-studio.environment: "production"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 1G
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:4.8.1
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB_DRIVER: pgsql
      ADMINER_DESIGN: pepa-linha
    labels:
      com.sva-studio.monitoring: "disabled"
      com.sva-studio.component: "adminer"
      com.sva-studio.environment: "production"
    networks:
      - public
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 32M
        limits:
          memory: 128M
          cpus: '0.10'
      labels:
        - traefik.enable=true
        - traefik.docker.network=public
        - traefik.frontend.rule=Host:${SVA_DB_ADMIN_HOST}
        - traefik.frontend.auth.basic.users=${SVA_DB_ADMIN_BASIC_AUTH}
        - traefik.port=8080
        - traefik.http.routers.sva-studio-adminer.rule=Host(`${SVA_DB_ADMIN_HOST}`)
        - traefik.http.routers.sva-studio-adminer.entrypoints=web,websecure
        - traefik.http.routers.sva-studio-adminer.tls.certresolver=letsencrypt
        - traefik.http.routers.sva-studio-adminer.service=sva-studio-adminer
        - traefik.http.routers.sva-studio-adminer.middlewares=sva-studio-adminer-auth
        - traefik.http.middlewares.sva-studio-adminer-auth.basicauth.users=${SVA_DB_ADMIN_BASIC_AUTH}
        - traefik.http.services.sva-studio-adminer.loadbalancer.server.port=8080
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php -r \"exit(@file_get_contents('http://127.0.0.1:8080') === false ? 1 : 0);\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  # -------------------------------------------------------------------------
  # Monitoring – OTEL Collector + Storage + UI
  # -------------------------------------------------------------------------
  monitoring-config-init:
    image: ${SVA_MONITORING_REGISTRY}/sva-studio-monitoring-config-init:${SVA_MONITORING_CONFIG_INIT_IMAGE_TAG}
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "monitoring-config-init"
      com.sva-studio.monitoring-config-version: "${SVA_MONITORING_CONFIG_INIT_IMAGE_TAG}"
      com.sva-studio.environment: "production"
    volumes:
      - otel-config:/config/otel
      - loki-config:/config/loki
      - prometheus-config:/config/prometheus
      - grafana-provisioning:/config/grafana/provisioning
      - grafana-dashboards:/config/grafana/dashboards
      - promtail-config-data:/config/promtail
      - alertmanager-config-data:/config/alertmanager
      - loki-data:/data/loki
      - prometheus-data:/data/prometheus
      - grafana-data:/data/grafana
      - alertmanager-data:/data/alertmanager
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: none
      resources:
        reservations:
          memory: 16M
        limits:
          memory: 64M
          cpus: '0.10'

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    command: ["--config=/etc/otel/otel-collector.yml"]
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "otel-collector"
      com.sva-studio.monitoring-config-version: "${SVA_MONITORING_CONFIG_INIT_IMAGE_TAG}"
      com.sva-studio.environment: "production"
    volumes:
      - otel-config:/etc/otel:ro
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 128M
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:13133/healthz >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

  loki:
    image: grafana/loki:2.9.6
    user: "10001"
    command: ["-config.file=/etc/loki/config.yml"]
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "loki"
      com.sva-studio.monitoring-config-version: "${SVA_MONITORING_CONFIG_INIT_IMAGE_TAG}"
      com.sva-studio.environment: "production"
    volumes:
      - loki-config:/etc/loki:ro
      - loki-data:/loki
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
          cpus: '0.75'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.enable-admin-api"  # Benötigt für TSDB-Cleanup (DELETE /api/v1/admin/tsdb/clean_tombstones)
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "prometheus"
      com.sva-studio.monitoring-config-version: "${SVA_MONITORING_CONFIG_INIT_IMAGE_TAG}"
      com.sva-studio.environment: "production"
    volumes:
      - prometheus-config:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 512M
        limits:
          memory: 1G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.3
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
      GF_METRICS_ENABLED: "true"
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "grafana"
      com.sva-studio.monitoring-config-version: "${SVA_MONITORING_CONFIG_INIT_IMAGE_TAG}"
      com.sva-studio.environment: "production"
    volumes:
      - grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 256M
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

  promtail:
    image: grafana/promtail:2.9.8
    command: ["-config.file=/etc/promtail/config.yml"]
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "promtail"
      com.sva-studio.monitoring-config-version: "${SVA_MONITORING_CONFIG_INIT_IMAGE_TAG}"
      com.sva-studio.environment: "production"
    volumes:
      - promtail-config-data:/etc/promtail:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 128M
          cpus: '0.25'

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    labels:
      com.sva-studio.monitoring: "enabled"
      com.sva-studio.component: "alertmanager"
      com.sva-studio.monitoring-config-version: "${SVA_MONITORING_CONFIG_INIT_IMAGE_TAG}"
      com.sva-studio.environment: "production"
    volumes:
      - alertmanager-config-data:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == node-005.sva
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      resources:
        reservations:
          memory: 64M
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/healthy >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

# ---------------------------------------------------------------------------
# Netzwerke
# ---------------------------------------------------------------------------
networks:
  public:
    external: true
  internal:
    driver: overlay

# ---------------------------------------------------------------------------
# Volumes – stateful Services behalten ihre Daten über Redeployments hinweg.
# ---------------------------------------------------------------------------
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  otel-config:
    driver: local
  loki-config:
    driver: local
  prometheus-config:
    driver: local
  grafana-provisioning:
    driver: local
  grafana-dashboards:
    driver: local
  promtail-config-data:
    driver: local
  alertmanager-config-data:
    driver: local
  prometheus-data:
    driver: local
  loki-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
