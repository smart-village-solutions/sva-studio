      #   annotations:
      #     summary: "Hohe HTTP Error Rate in Workspace {{ $labels.workspace_id }}"
      #     description: "{{ $value | humanizePercentage }} der Requests schlagen fehl"

  - name: iam_role_sync_alerts
    interval: 1m
    rules:
      - alert: IamRoleSyncFailureRateHigh
        expr: |
          sum(rate(iam_role_sync_operations_total{result="failure"}[15m]))
          /
          clamp_min(sum(rate(iam_role_sync_operations_total[15m])), 0.001) > 0.05
        for: 15m
        labels:
          severity: warning
          component: iam-role-sync
        annotations:
          summary: "IAM Rollen-Sync-Fehlerquote erhöht"
          description: "Mehr als 5% der Rollen-Sync-Operationen schlagen seit 15 Minuten fehl."

      - alert: IamRoleSyncFailureRateCritical
        expr: |
          sum(rate(iam_role_sync_operations_total{result="failure"}[10m]))
          /
          clamp_min(sum(rate(iam_role_sync_operations_total[10m])), 0.001) > 0.20
        for: 10m
        labels:
          severity: critical
          component: iam-role-sync
        annotations:
          summary: "IAM Rollen-Sync-Fehlerquote kritisch"
          description: "Mehr als 20% der Rollen-Sync-Operationen schlagen seit 10 Minuten fehl."

      - alert: IamRoleDriftBacklogDetected
        expr: |
          max by (instance_id) (iam_role_drift_backlog) > 0
        for: 15m
        labels:
          severity: warning
          component: iam-role-sync
        annotations:
          summary: "IAM Rollen-Drift erkannt"
          description: "Für Instance {{ $labels.instance_id }} besteht seit mindestens 15 Minuten ein Drift-Backlog."

      - alert: IamRoleDriftBacklogCritical
        expr: |
          max by (instance_id) (iam_role_drift_backlog) > 0
        for: 60m
        labels:
          severity: critical
          component: iam-role-sync
        annotations:
          summary: "IAM Rollen-Drift über SLO-Grenze"
          description: "Für Instance {{ $labels.instance_id }} besteht seit mindestens 60 Minuten ein Drift-Backlog."

  - name: iam_instance_registry_alerts
    interval: 1m
    rules:
      - alert: TenantAdminClientDriftDetected
        expr: |
          max by (instance_id) (sva_instance_admin_client_drift) > 0
        for: 10m
        labels:
          severity: warning
          component: instance-registry
        annotations:
          summary: "Tenant-Admin-Client-Drift erkannt"
          description: "Für die aktive Instanz {{ $labels.instance_id }} fehlt seit mindestens 10 Minuten der Tenant-Admin-Client oder dessen Secret."

      - alert: TenantAdminClientDriftCritical
        expr: |
          max by (instance_id) (sva_instance_admin_client_drift) > 0
        for: 30m
        labels:
          severity: critical
          component: instance-registry
        annotations:
          summary: "Tenant-Admin-Client-Drift kritisch"
          description: "Für die aktive Instanz {{ $labels.instance_id }} besteht seit mindestens 30 Minuten Tenant-Admin-Client-Drift. Reconcile, Backfill oder Rollback ist erforderlich."
