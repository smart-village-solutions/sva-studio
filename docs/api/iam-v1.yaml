            deactivatedUserIds:
              type: array
              items:
                type: string
                format: uuid
            count:
              type: integer
    SyncUsersResponse:
      type: object
      required: [data]
      properties:
        requestId:
          type: string
        data:
          type: object
          required: [scheduled]
          properties:
            scheduled:
              type: boolean
            importedUsers:
              type: integer
            updatedUsers:
              type: integer
    CreateUserRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        displayName:
          type: string
        roleIds:
          type: array
          items:
            type: string
            format: uuid
    UpdateUserRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
