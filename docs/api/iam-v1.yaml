openapi: 3.1.0
info:
  title: SVA IAM API
  version: 1.0.0
  description: Zentrale IAM-API-Dokumentation fuer Admin-, Governance- und DSR-Surface im SVA Studio.
servers:
  - url: /
paths:
  /health/live:
    get:
      summary: Prozess-Liveness
      responses:
        '200':
          description: Service lebt.
  /health/ready:
    get:
      summary: Readiness (DB, Redis, Keycloak)
      responses:
        '200':
          description: Service ist bereit.
        '503':
          description: Mindestens ein Dependency-Check ist fehlgeschlagen.
  /iam/me/permissions:
    get:
      summary: Effektive Permissions des aktuellen Benutzers lesen
      parameters:
        - name: instanceId
          in: query
          schema:
            type: string
        - name: organizationId
          in: query
          schema:
            type: string
            format: uuid
        - name: actingAsUserId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Permissions geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MePermissionsResponse'
        '400':
          description: Ungueltiger Request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Instanz- oder Impersonation-Kontext verweigert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '503':
          description: IAM-Datenbank nicht verfuegbar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/authorize:
    post:
      summary: Deterministische RBAC-Autorisierungsentscheidung ausfuehren
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthorizeRequest'
      responses:
        '200':
          description: Autorisierungsentscheidung berechnet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizeResponse'
        '400':
          description: Request ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '503':
          description: IAM-Datenbank nicht verfuegbar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/governance/workflows:
    get:
      summary: Normalisierten Governance-Feed lesen
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: instanceId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum:
              - permission_change
              - delegation
              - impersonation
              - legal_acceptance
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Governance-Feed geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceCaseListResponse'
        '403':
          description: Keine Berechtigung fuer Governance-Transparenz.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      summary: Governance-Workflow ausfuehren
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceWorkflowRequest'
      responses:
        '200':
          description: Workflow abgeschlossen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceWorkflowMutationResponse'
        '400':
          description: Request oder Fachregel ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Instanzkontext oder Rolle verweigert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '503':
          description: Governance-Datenbank nicht verfuegbar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/governance/compliance/export:
    get:
      summary: Governance-Compliance-Export herunterladen
      parameters:
        - name: instanceId
          in: query
          required: true
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv, siem]
            default: json
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Export erfolgreich erzeugt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceComplianceExportResponse'
            text/csv:
              schema:
                type: string
        '400':
          description: Instanzkontext oder Format ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/me/data-export:
    get:
      summary: Legacy-GET fuer Self-Service-Exportstart
      responses:
        '405':
          description: Export-Starts sind nur noch per POST erlaubt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      summary: Self-Service-Datenexport starten
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataExportRequest'
      responses:
        '200':
          description: Export synchron erzeugt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportAcceptedResponse'
            text/csv:
              schema:
                type: string
            application/xml:
              schema:
                type: string
        '202':
          description: Export asynchron eingeplant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportAcceptedResponse'
        '400':
          description: Request ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: CSRF oder Instanzkontext verweigert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Idempotency-Key-Konflikt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/me/data-export/status:
    get:
      summary: Status oder Ergebnis eines Self-Service-Exports lesen
      parameters:
        - name: instanceId
          in: query
          schema:
            type: string
        - name: jobId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: download
          in: query
          schema:
            type: string
            enum: [json, csv, xml]
      responses:
        '200':
          description: Status oder Payload geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportStatusResponse'
            text/csv:
              schema:
                type: string
            application/xml:
              schema:
                type: string
        '404':
          description: Job nicht gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/me/data-subject-rights/requests:
    get:
      summary: Self-Service-Datenschutzuebersicht lesen
      responses:
        '200':
          description: Self-Service-DSR geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DsrSelfServiceResponse'
        '404':
          description: Konto nicht gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      summary: Betroffenenrechtsantrag anlegen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataSubjectRequest'
      responses:
        '200':
          description: Antrag angenommen oder verarbeitet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataSubjectRequestResponse'
        '400':
          description: Request oder Typ ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/me/profile:
    post:
      summary: Profilkorrektur als DSR-Vorgang starten
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileCorrectionRequest'
      responses:
        '200':
          description: Korrekturanfrage erstellt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileCorrectionResponse'
        '400':
          description: Request ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/me/optional-processing/execute:
    post:
      summary: Optionale Verarbeitung ausfuehren oder blockierten Zustand melden
      parameters:
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      responses:
        '200':
          description: Verarbeitung ausgefuehrt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionalProcessingResponse'
        '423':
          description: Verarbeitung durch Restriktion oder Widerspruch blockiert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionalProcessingResponse'
  /iam/admin/data-subject-rights/export:
    get:
      summary: Legacy-GET fuer Admin-Exportstart
      responses:
        '405':
          description: Export-Starts sind nur noch per POST erlaubt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    post:
      summary: DSR-Admin-Export starten
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDataExportRequest'
      responses:
        '200':
          description: Export synchron erzeugt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportAcceptedResponse'
            text/csv:
              schema:
                type: string
            application/xml:
              schema:
                type: string
        '202':
          description: Export asynchron eingeplant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportAcceptedResponse'
        '400':
          description: Request ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '403':
          description: Rolle, CSRF oder Instanzkontext verweigert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Idempotency-Key-Konflikt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/admin/data-subject-rights/export/status:
    get:
      summary: Status oder Ergebnis eines Admin-Exports lesen
      parameters:
        - name: instanceId
          in: query
          schema:
            type: string
        - name: jobId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: download
          in: query
          schema:
            type: string
            enum: [json, csv, xml]
      responses:
        '200':
          description: Status oder Payload geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportStatusResponse'
            text/csv:
              schema:
                type: string
            application/xml:
              schema:
                type: string
        '404':
          description: Job nicht gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/admin/data-subject-rights/cases:
    get:
      summary: Normalisierten DSR-Admin-Feed lesen
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: instanceId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum:
              - request
              - export_job
              - legal_hold
              - profile_correction
              - recipient_notification
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DsrCanonicalStatus'
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: DSR-Faelle geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DsrCaseListResponse'
        '403':
          description: Keine Berechtigung fuer DSR-Transparenz.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/admin/data-subject-rights/legal-holds/apply:
    post:
      summary: Legal Hold setzen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegalHoldApplyRequest'
      responses:
        '200':
          description: Hold aktiviert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalHoldApplyResponse'
        '400':
          description: Request ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/admin/data-subject-rights/legal-holds/release:
    post:
      summary: Legal Hold aufheben
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LegalHoldReleaseRequest'
      responses:
        '200':
          description: Holds freigegeben.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalHoldReleaseResponse'
        '400':
          description: Request ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /iam/admin/data-subject-rights/maintenance:
    post:
      summary: DSR-Wartungslauf ausfuehren
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DsrMaintenanceRequest'
      responses:
        '200':
          description: Wartungslauf abgeschlossen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DsrMaintenanceResponse'
        '400':
          description: Request ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/iam/users:
    get:
      summary: Nutzerliste (paginiert)
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, pending]
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Erfolgreiche Nutzerliste.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
    post:
      summary: Nutzer anlegen (Keycloak-First)
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Nutzer angelegt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserItemResponse'
        '409':
          description: Idempotency-Key-Konflikt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/iam/users/sync-keycloak:
    post:
      summary: Nutzer aus Keycloak synchronisieren
      responses:
        '202':
          description: Synchronisierung angestossen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncUsersResponse'
        '503':
          description: Keycloak nicht verfuegbar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/iam/users/{userId}:
    get:
      summary: Einzelnen Nutzer abrufen
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Nutzerdetails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserItemResponse'
        '404':
          description: Nutzer nicht gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    patch:
      summary: Nutzer aktualisieren
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Nutzer aktualisiert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserItemResponse'
        '400':
          description: Payload oder Rollenreferenz ungueltig.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      summary: Nutzer deaktivieren
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      responses:
        '200':
          description: Nutzer deaktiviert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserItemResponse'
        '409':
          description: Self- oder Last-Admin-Schutz.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/v1/iam/users/{userId}/timeline:
    get:
      summary: Vereinigte User-Timeline lesen
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Timeline geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTimelineResponse'
  /api/v1/iam/users/bulk-deactivate:
    post:
      summary: Mehrere Nutzer deaktivieren
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIds]
              properties:
                userIds:
                  type: array
                  maxItems: 50
                  items:
                    type: string
                    format: uuid
      responses:
        '200':
          description: Bulk-Deaktivierung erfolgreich.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeactivateResponse'
  /api/v1/iam/users/me/profile:
    get:
      summary: Eigenes Profil abrufen
      responses:
        '200':
          description: Profil geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserItemResponse'
    patch:
      summary: Eigenes Profil aktualisieren
      parameters:
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMyProfileRequest'
      responses:
        '200':
          description: Profil aktualisiert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserItemResponse'
  /api/v1/iam/organizations:
    get:
      summary: Organisationen auflisten
      responses:
        '200':
          description: Organisationsliste geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
    post:
      summary: Organisation anlegen
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organisation angelegt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationItemResponse'
  /api/v1/iam/organizations/{organizationId}:
    get:
      summary: Organisation laden
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organisation geladen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationItemResponse'
    patch:
      summary: Organisation aktualisieren
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: X-Requested-With
          required: true
          schema:
            type: string
            enum: [XMLHttpRequest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Organisation aktualisiert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationItemResponse'
    delete:
      summary: Organisation deaktivieren
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organisation deaktiviert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationItemResponse'
  /api/v1/iam/organizations/{organizationId}/memberships:
    post:
      summary: Membership zu Organisation zuweisen
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMembershipRequest'
      responses:
        '200':
          description: Membership gespeichert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMembershipResponse'
  /api/v1/iam/organizations/{organizationId}/memberships/{accountId}:
    delete:
      summary: Membership aus Organisation entfernen
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: accountId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Membership entfernt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMembershipResponse'
  /api/v1/iam/me/context:
    get:
      summary: Aktiven Organisationskontext lesen
      responses:
        '200':
