components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    ApiErrorResponse:
      type: object
      required: [error]
      properties:
        requestId:
          type: string
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    Pagination:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
    UserRole:
      type: object
      required: [roleId, roleName, roleLevel]
      properties:
        roleId:
          type: string
          format: uuid
        roleName:
          type: string
        roleLevel:
          type: integer
    User:
      type: object
      required: [id, keycloakSubject, displayName, status, roles]
      properties:
        id:
          type: string
          format: uuid
        keycloakSubject:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        status:
          type: string
          enum: [active, inactive, pending]
        avatarUrl:
          type: string
          format: uri
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
    UserItemResponse:
      type: object
      required: [data]
      properties:
        requestId:
          type: string
        data:
          $ref: '#/components/schemas/User'
    UserListResponse:
      type: object
      required: [data, pagination]
      properties:
        requestId:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        pagination:
          $ref: '#/components/schemas/Pagination'
