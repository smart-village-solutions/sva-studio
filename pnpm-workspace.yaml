cleanupUnusedCatalogs: true
injectWorkspacePackages: true
linkWorkspacePackages: true
preferWorkspacePackages: true
engineStrict: true
nodeVersion: 24.15.0
minimumReleaseAge: 1440
minimumReleaseAgeIgnoreMissingTime: false
minimumReleaseAgeStrict: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Legacy toolchains in the current Nx/Babel/TanStack plugin graph still resolve semver 6.3.1.
  # Remove this exact-version exception once the transitive graph no longer requires semver 6.x.
  - semver@6.3.1
blockExoticSubdeps: true
allowBuilds:
  '@google/genai': true
  bufferutil: true
  esbuild: true
  msw: false
  nx@22.7.1 || 22.7.4 || 23.0.1: true
  protobufjs: false
  sharp: true
overrides:
  # Keep @ai-sdk/provider-utils unpinned here: Stagehand 3.6.0 still resolves against
  # the AI SDK v2/v3 provider graph, and the old 5.0.2 override forced an incompatible tree.
  "@tanstack/react-router": "1.170.8"
  "@tanstack/router-core": "1.171.6"
  "@tanstack/start-plugin-core": "1.171.6"
  ast-v8-to-istanbul: "1.0.0"
  tinyexec: "1.1.2"
  esbuild: "0.28.1"
  h3: "2.0.1-rc.20"
  minimatch: "10.2.3"
  axios: "1.16.0"
  form-data: "4.0.6"
  follow-redirects: "1.16.0"
  launch-editor: "2.14.1"
  postcss: "8.5.11"
  protobufjs: "7.6.3"
  rollup: "4.59.0"
  srvx: "0.11.15"
  solid-js: "1.9.11"
  seroval: "1.4.2"
  "@types/node@22>undici-types": "6.18.2"
  pino: "9.12.0"
  slow-redact: "0.3.1"
  tmp: "0.2.7"
  uuid: "11.1.1"
  js-yaml: "4.2.0"
  "@opentelemetry/core": "2.8.0"
  "@actions/github>undici": "6.27.0"
  "@actions/http-client>undici": "6.27.0"
  "jsdom>undici": "7.28.0"

packages:
  - apps/*
  - packages/*
  - tooling/*
