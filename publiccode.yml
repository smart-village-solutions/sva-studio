description:
  de:
    genericName: SVA Studio
    shortDescription: >-
      SVA Studio ist eine modulare Open-Source-Plattform für kommunales
      Content-Management, Benutzerverwaltung, App-Design, Module und
      Schnittstellen.
    longDescription: >-
      SVA Studio modernisiert das Redaktionssystem der Smart Village App zu
      einer integrierten, API-first ausgerichteten Plattform für Kommunen und
      andere öffentliche Organisationen. Das System bündelt Content-Management,
      Identitäts- und Rechteverwaltung, Design- und Modulkonfiguration sowie die
      Anbindung externer Fachverfahren in einer erweiterbaren Webanwendung. Der
      Schwerpunkt liegt auf typsicherer, modularer Architektur, nachnutzbaren
      Schnittstellen, sicherem Betrieb und der Unterstützung kommunaler
      Redaktions- und Verwaltungsprozesse.
applicationSuite: Smart Village App