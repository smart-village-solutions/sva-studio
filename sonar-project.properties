# SonarCloud-Konfiguration für SVA Studio
# Docs: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

sonar.organization=smart-village-app
sonar.projectKey=smart-village-app_sva-studio
sonar.projectName=SVA Studio

# Quellcode
sonar.sources=apps/sva-studio-react/src,packages/auth/src,packages/core/src,packages/data/src,packages/sva-mainserver/src,packages/routing/src,packages/sdk/src,packages/monitoring-client/src,packages/plugin-example/src

# Tests
sonar.tests=apps/sva-studio-react/src,packages/auth/src,packages/core/src,packages/data/src,packages/sva-mainserver/src,packages/routing/src,packages/sdk/src,packages/monitoring-client/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage (lcov-Reports aus Vitest)
sonar.javascript.lcov.reportPaths=apps/sva-studio-react/coverage/lcov.info,packages/auth/coverage/lcov.info,packages/core/coverage/lcov.info,packages/data/coverage/lcov.info,packages/sva-mainserver/coverage/lcov.info,packages/routing/coverage/lcov.info,packages/sdk/coverage/lcov.info,packages/monitoring-client/coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPaths=tsconfig.base.json

# Coverage-Ausschlüsse (plugin-example ist coverage-exempt, Demo-/Bootstrap-Dateien sind nur integrationsgetrieben getestet)
sonar.coverage.exclusions=packages/plugin-example/**,apps/sva-studio-react/src/server.ts,apps/sva-studio-react/src/routes/-core-routes.tsx,packages/data/src/integrations/instance-integrations.server.ts

# Copy-Paste-Detection-Ausschlüsse (Übersetzungsressourcen enthalten absichtlich parallele Locale-Strukturen)
sonar.cpd.exclusions=apps/sva-studio-react/src/i18n/resources.ts

# Ausschlüsse
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.*,**/e2e/**,**/test-results/**,**/playwright-report/**,deploy/**,dev/**,scripts/**,concepts/**,artifacts/**,tooling/**,openspec/**

# New Code: Referenz-Branch für "New Code"-Berechnung
sonar.newCode.referenceBranch=main

# Encoding
sonar.sourceEncoding=UTF-8
