# SonarCloud-Konfiguration für SVA Studio
# Docs: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/analysis-parameters/

sonar.organization=smart-village-app
sonar.projectKey=smart-village-app_sva-studio
sonar.projectName=SVA Studio

# Quellcode
sonar.sources=apps/sva-studio-react/src,packages/auth-runtime/src,packages/core/src,packages/data/src,packages/data-client/src,packages/data-repositories/src,packages/iam-admin/src,packages/iam-core/src,packages/iam-governance/src,packages/instance-registry/src,packages/monitoring-client/src,packages/plugin-news/src,packages/plugin-sdk/src,packages/routing/src,packages/sdk/src,packages/server-runtime/src,packages/studio-ui-react/src,packages/sva-mainserver/src

# Tests
sonar.tests=apps/sva-studio-react/src,packages/auth-runtime/src,packages/core/src,packages/data/src,packages/data-client/src,packages/data-repositories/src,packages/iam-admin/src,packages/iam-core/src,packages/iam-governance/src,packages/instance-registry/src,packages/monitoring-client/src,packages/plugin-news/src,packages/plugin-sdk/src,packages/routing/src,packages/sdk/src,packages/server-runtime/src,packages/studio-ui-react/src,packages/sva-mainserver/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage (Repo-relative Sonar-LCOV aus `pnpm sonar:prepare-lcov`)
sonar.javascript.lcov.reportPaths=artifacts/sonar/lcov.info

# TypeScript
sonar.typescript.tsconfigPaths=tsconfig.base.json

# Coverage-Ausschlüsse (nur generierte oder lokale Debug-Artefakte)
sonar.coverage.exclusions=apps/sva-studio-react/src/routeTree.gen.ts,apps/sva-studio-react/src/routes/__debug/phase1-test/**

# Copy-Paste-Detection-Ausschlüsse:
# - Übersetzungsressourcen und generierte Artefakte
# - dokumentierte Migrationsspiegel während der Data-Repository- und Studio-UI-Extraktion
sonar.cpd.exclusions=apps/sva-studio-react/src/i18n/resources.ts,apps/sva-studio-react/src/routeTree.gen.ts,apps/sva-studio-react/src/components/ui/**,apps/sva-studio-react/src/components/StudioDataTable.tsx,apps/sva-studio-react/src/components/StudioListPageTemplate.tsx,packages/data-repositories/src/**

# Ausschlüsse
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.config.*,**/e2e/**,**/test-results/**,**/playwright-report/**,deploy/**,dev/**,scripts/**,concepts/**,artifacts/**,tooling/**,openspec/**

# New Code: Referenz-Branch für "New Code"-Berechnung
sonar.newCode.referenceBranch=main

# Encoding
sonar.sourceEncoding=UTF-8
